{% extends 'dashboard/base.html' %}

{% block title %}New Stock Transaction{% endblock %}

{% block content %}
<h1>New Stock Transaction</h1>

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <br>
    <button type="submit">Record Transaction</button>
</form>

<p><strong>Note:</strong> OUT transactions will reduce stock automatically.</p>
{% endblock %}
