{% extends 'dashboard/base.html' %}

{% block title %}{% if form.instance.pk %}Edit{% else %}Add{% endif %} Product{% endblock %}

{% block content %}
<h1>{% if form.instance.pk %}Edit{% else %}Add New{% endif %} Product</h1>

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <br>
    <button type="submit">Save</button>
    <a href="{% url 'dashboard:product_list' %}">Cancel</a>
</form>
{% endblock %}
